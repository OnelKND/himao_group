<!doctype html>
<html lang="fr" data-theme="himaotheme">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page introuvable | HIMAO Group</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/apple-touch-icon.png" />
  <link rel="icon" href="/assets/images/favicon.ico" />
  <script src="https://kit.fontawesome.com/27290c1c94.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="/css/output.css" />
</head>
<body class="bg-white text-himao-dark font-sans">
  <section class="relative flex min-h-screen flex-col items-center justify-center overflow-hidden px-4 py-16 text-center">
    <!-- Décor -->
    <div class="absolute inset-0 bg-gradient-to-br from-base-200 via-white to-base-200/60"></div>
    <div class="absolute top-10 right-10 w-40 h-40 md:w-56 md:h-56 bg-himao-gold/10 rounded-full blur-3xl animate-pulse-glow"></div>
    <div class="absolute bottom-10 left-10 w-32 h-32 md:w-48 md:h-48 bg-himao-navy/5 rounded-full blur-3xl animate-pulse-glow"></div>
    <div class="absolute top-1/4 left-[12%] w-3 h-3 bg-himao-gold/40 rounded-full animate-pulse"></div>
    <div class="absolute top-1/2 right-[15%] w-2 h-2 bg-himao-navy/30 rounded-full animate-pulse"></div>
    <div class="absolute bottom-1/4 left-1/4 w-2.5 h-2.5 bg-himao-gold/30 rounded-full animate-pulse"></div>

    <!-- Pointillés en forme de chemin égaré -->
    <svg class="absolute inset-0 h-full w-full opacity-20" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
      <path d="M 5% 80% Q 25% 55%, 45% 70% T 95% 40%" fill="none" stroke="#1F3A5F" stroke-width="2"
        stroke-dasharray="2 10" stroke-linecap="round" />
    </svg>

    <div class="relative z-10 flex flex-col items-center animate-fade-in">
      <!-- Boussole animée -->
      <div class="relative mb-8 flex h-28 w-28 items-center justify-center animate-float">
        <div class="absolute inset-0 rounded-full border-2 border-dashed border-himao-navy/15 animate-spin-slow"></div>
        <div class="flex h-24 w-24 items-center justify-center rounded-full border-4 border-himao-gold/40 bg-white shadow-xl">
          <svg class="h-16 w-16" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="9" fill="none" stroke="#1F3A5F" stroke-width="1.2" />
            <text x="12" y="5.6" text-anchor="middle" font-size="2.3" font-weight="700" fill="#1F3A5F">N</text>
            <text x="19" y="12.9" text-anchor="middle" font-size="2.3" font-weight="700" fill="#1F3A5F">E</text>
            <text x="12" y="19.3" text-anchor="middle" font-size="2.3" font-weight="700" fill="#1F3A5F">S</text>
            <text x="5" y="12.9" text-anchor="middle" font-size="2.3" font-weight="700" fill="#1F3A5F">O</text>
            <circle cx="12" cy="12" r="1.3" fill="#1F3A5F" />
            <path class="animate-compass-search" d="M12 12 L15.2 8.2 L13.1 13.1 L8.2 15.2 Z" fill="#C9A24B" />
          </svg>
        </div>
      </div>

      <div class="flex gap-1 md:gap-3 text-7xl md:text-9xl font-extrabold leading-none">
        <span class="text-gradient animate-float">4</span>
        <span class="text-gradient animate-float [animation-delay:0.25s]">0</span>
        <span class="text-gradient animate-float [animation-delay:0.5s]">4</span>
      </div>

      <h1 class="mt-6 text-2xl md:text-3xl font-bold text-himao-navy">
        Oups, cette page a perdu le cap
      </h1>
      <p class="mt-3 max-w-md text-himao-dark/70">
        La page que vous cherchez n'existe pas, a été déplacée, ou n'a jamais existé.
        Pas de panique, notre boussole vous remet sur la bonne route.
      </p>

      <div class="mt-8 flex flex-wrap justify-center gap-4">
        <a href="index.html"
          class="btn btn-primary rounded-full px-8 shadow-lg hover:shadow-xl hover:scale-105 transition-all font-semibold">
          Retour à l'accueil
        </a>
        <a href="contact.html"
          class="btn btn-outline border-himao-navy text-himao-navy hover:bg-himao-navy hover:text-white rounded-full px-8 transition-all">
          Nous contacter
        </a>
      </div>
    </div>
  </section>
</body>
</html>
